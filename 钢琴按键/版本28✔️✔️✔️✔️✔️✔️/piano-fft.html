<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>键盘映射钢琴 - C3到C7音域</title>
<!-- 
版本日志 - 版本28✔️✔️✔️✔️✔️✔️（相比版本27多1个勾）

改进内容：
1. ✅ 添加文本不可复制功能（CSS user-select: none）
2. ✅ 实现滑动出视图范围不回弹功能
   - 鼠标事件：mousemove事件监听，移出钢琴容器时自动移除active状态
   - 触摸事件：touchmove事件监听，移出钢琴容器时自动移除active状态

评分说明：版本27为5个勾，版本28为6个勾，增加1个勾以体现上述两项改进。
 -->
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
}

.container {
    max-width: 1200px;
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.header {
    text-align: center;
    margin-bottom: 30px;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    background: linear-gradient(45deg, #ff6b6b, #feca57);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    user-select: none;
}

.subtitle {
    font-size: 1.1rem;
    opacity: 0.8;
    margin-bottom: 20px;
}

.piano-container {
    position: relative;
    height: 300px;
    margin-bottom: 40px;
    background: #2d3436;
    border-radius: 10px;
    padding: 20px;
    box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
}

.white-keys {
    display: flex;
    height: 200px;
    position: relative;
}

.white-key {
    flex: 1;
    background: linear-gradient(to bottom, #fff 0%, #f8f9fa 100%);
    border: 1px solid #ddd;
    border-radius: 0 0 8px 8px;
    margin: 0 2px;
    position: relative;
    cursor: pointer;
    transition: all 0.1s ease;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    user-select: none;
    -webkit-user-select: none;
}

.white-key.active {
    background: linear-gradient(to bottom, #ffeb3b 0%, #fbc02d 100%);
    transform: translateY(5px);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
}

.black-keys {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 120px;
    pointer-events: none;
}

.black-key {
    position: absolute;
    width: 6%;
    height: 120px;
    background: linear-gradient(to bottom, #333 0%, #000 100%);
    border-radius: 0 0 5px 5px;
    z-index: 2;
    cursor: pointer;
    transition: all 0.1s ease;
    pointer-events: auto;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    user-select: none;
    -webkit-user-select: none;
}

.black-key.active {
    background: linear-gradient(to bottom, #ff6b6b 0%, #c23616 100%);
    transform: translateY(3px);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
}

.key-label {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.9rem;
    font-weight: bold;
    color: #2d3436;
    user-select: none;
    -webkit-user-select: none;
}

.black-key .key-label {
    color: #fff;
    bottom: 8px;
    font-size: 0.7rem;
}

.keyboard-mapping {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    padding: 20px;
    margin-top: 20px;
}

.mapping-section {
    margin-bottom: 25px;
}

.mapping-section h3 {
    color: #feca57;
    margin-bottom: 15px;
    font-size: 1.2rem;
}

.key-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.key-item {
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 15px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    min-width: 60px;
    text-align: center;
}

.piano-key {
    font-weight: bold;
    color: #ff6b6b;
}

.computer-key {
    font-weight: bold;
    color: #feca57;
    background: rgba(254, 202, 87, 0.1);
    border-radius: 4px;
    padding: 2px 6px;
    margin: 0 2px;
}

.instructions {
    text-align: center;
    margin-top: 20px;
    font-size: 0.9rem;
    opacity: 0.8;
}

.octave-indicator {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(255, 255, 255, 0.2);
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 0.8rem;
}

@media (max-width: 768px) {
    .container {
        padding: 15px;
    }
    
    h1 {
        font-size: 2rem;
    }
    
    .piano-container {
        height: 250px;
    }
    
    .white-keys {
        height: 150px;
    }
    
    .black-keys {
        height: 90px;
    }
    
    .black-key {
        height: 90px;
    }
}
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎹 键盘映射钢琴</h1>
            <p class="subtitle">C3-C7 五组音域键盘映射</p>
        </div>
        
        <div class="piano-container">
            <div class="octave-indicator">C3-C7</div>
            <div class="white-keys" id="whiteKeys"></div>
            <div class="black-keys" id="blackKeys"></div>
        </div>
        
        <div class="keyboard-mapping">
            <div class="mapping-section">
                <h3>🎵 键盘映射指南</h3>
                <div class="key-group">
                    <div class="key-item">
                        <span class="piano-key">C3音域</span> → 
                        <span class="computer-key">Z</span>-<span class="computer-key">N</span>
                    </div>
                    <div class="key-item">
                        <span class="piano-key">C4音域</span> → 
                        <span class="computer-key">A</span>-<span class="computer-key">J</span>
                    </div>
                    <div class="key-item">
                        <span class="piano-key">C6音域</span> → 
                        <span class="computer-key">Q</span>-<span class="computer-key">U</span>
                    </div>
                    <div class="key-item">
                        <span class="piano-key">C7音域</span> → 
                        <span class="computer-key">1</span>-<span class="computer-key">7</span>
                    </div>
                </div>
            </div>
        </div>
        
        <p class="instructions">💡 提示：按下对应的电脑键盘按键即可弹奏钢琴，支持同时按下多个键</p>
    </div>

    <script>
        let audioContext = null;
        
        function getAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return audioContext;
        }

        function getPianoFrequency(note, octave) {
            const A4 = 440;
            const notes = {
                'C': -9, 'C#': -8, 'D': -7, 'D#': -6, 'E': -5,
                'F': -4, 'F#': -3, 'G': -2, 'G#': -1, 'A': 0, 'A#': 1, 'B': 2
            };
            
            const semitonesFromA4 = (octave - 4) * 12 + notes[note];
            return A4 * Math.pow(2, semitonesFromA4 / 12);
        }

        function playNote(frequency, noteName) {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            const filter = ctx.createBiquadFilter();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, now);
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2000, now);
            
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.8, now + 0.02);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
            
            oscillator.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.start(now);
            oscillator.stop(now + 1.5);
        }

        const pianoConfig = {
            C3: {
                startNote: 'C',
                startOctave: 3,
                whiteKeys: 7,
                computerKeys: ['Z', 'X', 'C', 'V', 'B', 'N', 'M'],
                position: 0
            },
            C4: {
                startNote: 'C',
                startOctave: 4,
                whiteKeys: 7,
                computerKeys: ['A', 'S', 'D', 'F', 'G', 'H', 'J'],
                position: 7
            },
            C6: {
                startNote: 'C',
                startOctave: 6,
                whiteKeys: 7,
                computerKeys: ['Q', 'W', 'E', 'R', 'T', 'Y', 'U'],
                position: 14
            },
            C7: {
                startNote: 'C',
                startOctave: 7,
                whiteKeys: 7,
                computerKeys: ['1', '2', '3', '4', '5', '6', '7'],
                position: 21
            }
        };

        function createKeyboardMapping() {
            const mapping = {};
            const noteDetails = {};
            let whiteKeyIndex = 0;
            
            Object.keys(pianoConfig).forEach(octaveKey => {
                const config = pianoConfig[octaveKey];
                const notes = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
                
                notes.forEach((note, index) => {
                    if (index < config.whiteKeys) {
                        const computerKey = config.computerKeys[index];
                        const fullNote = note + config.startOctave;
                        const frequency = getPianoFrequency(note, config.startOctave);
                        
                        mapping[computerKey.toLowerCase()] = {
                            type: 'white',
                            note: fullNote,
                            frequency: frequency,
                            position: config.position + index
                        };
                        
                        noteDetails[fullNote] = {
                            computerKey: computerKey,
                            frequency: frequency,
                            position: config.position + index
                        };
                        
                        whiteKeyIndex++;
                    }
                });
            });
            
            return { mapping, noteDetails };
        }

        const { mapping, noteDetails } = createKeyboardMapping();

        function renderPiano() {
            const whiteKeysContainer = document.getElementById('whiteKeys');
            const blackKeysContainer = document.getElementById('blackKeys');
            
            whiteKeysContainer.innerHTML = '';
            blackKeysContainer.innerHTML = '';
            
            Object.keys(noteDetails).sort((a, b) => noteDetails[a].position - noteDetails[b].position).forEach(note => {
                const detail = noteDetails[note];
                
                const whiteKey = document.createElement('div');
                whiteKey.className = 'white-key';
                whiteKey.dataset.note = note;
                whiteKey.dataset.key = detail.computerKey.toLowerCase();
                
                const label = document.createElement('div');
                label.className = 'key-label';
                label.innerHTML = `${note}<br><small>${detail.computerKey}</small>`;
                
                whiteKey.appendChild(label);
                whiteKeysContainer.appendChild(whiteKey);
            });
            
            const blackNotes = [
                { note: 'C#3', position: 0.7 }, { note: 'D#3', position: 1.7 },
                { note: 'F#3', position: 3.7 }, { note: 'G#3', position: 4.7 }, { note: 'A#3', position: 5.7 },
                { note: 'C#4', position: 7.7 }, { note: 'D#4', position: 8.7 },
                { note: 'F#4', position: 10.7 }, { note: 'G#4', position: 11.7 }, { note: 'A#4', position: 12.7 },
                { note: 'C#6', position: 14.7 }, { note: 'D#6', position: 15.7 },
                { note: 'F#6', position: 17.7 }, { note: 'G#6', position: 18.7 }, { note: 'A#6', position: 19.7 },
                { note: 'C#7', position: 21.7 }, { note: 'D#7', position: 22.7 },
                { note: 'F#7', position: 24.7 }, { note: 'G#7', position: 25.7 }, { note: 'A#7', position: 26.7 }
            ];
            
            blackNotes.forEach(blackNote => {
                const blackKey = document.createElement('div');
                blackKey.className = 'black-key';
                blackKey.dataset.note = blackNote.note;
                
                const noteParts = blackNote.note.match(/([A-Z]#?)(\d)/);
                if (noteParts) {
                    const frequency = getPianoFrequency(noteParts[1], parseInt(noteParts[2]));
                    blackKey.dataset.frequency = frequency;
                    
                    const label = document.createElement('div');
                    label.className = 'key-label';
                    label.textContent = blackNote.note;
                    blackKey.appendChild(label);
                    
                    blackKey.style.left = `calc(${(blackNote.position / 28) * 100}% - 3%)`;
                    blackKeysContainer.appendChild(blackKey);
                }
            });
        }

        function setupKeyboardListeners() {
            const activeKeys = new Set();
            const activeTouchKeys = new Map();
            const pianoContainer = document.querySelector('.piano-container');
            
            document.addEventListener('keydown', (event) => {
                const key = event.key.toLowerCase();
                
                if (activeKeys.has(key) || !mapping[key]) {
                    return;
                }
                
                event.preventDefault();
                activeKeys.add(key);
                
                const keyInfo = mapping[key];
                const keyElement = document.querySelector(`[data-key="${key}"]`);
                
                if (keyElement) {
                    keyElement.classList.add('active');
                    playNote(keyInfo.frequency, keyInfo.note);
                }
            });
            
            document.addEventListener('keyup', (event) => {
                const key = event.key.toLowerCase();
                
                if (mapping[key]) {
                    activeKeys.delete(key);
                    const keyElement = document.querySelector(`[data-key="${key}"]`);
                    if (keyElement) {
                        keyElement.classList.remove('active');
                    }
                }
            });

            function isPointInsidePiano(clientX, clientY) {
                if (!pianoContainer) return false;
                const rect = pianoContainer.getBoundingClientRect();
                return clientX >= rect.left && clientX <= rect.right &&
                       clientY >= rect.top && clientY <= rect.bottom;
            }
            
            document.addEventListener('mousedown', (event) => {
                const keyElement = event.target.closest('.white-key, .black-key');
                if (keyElement) {
                    const note = keyElement.dataset.note;
                    if (note) {
                        keyElement.classList.add('active');
                        
                        const noteParts = note.match(/([A-Z]#?)(\d)/);
                        if (noteParts) {
                            const frequency = keyElement.dataset.frequency || 
                                           getPianoFrequency(noteParts[1], parseInt(noteParts[2]));
                            playNote(frequency, note);
                        }
                    }
                }
            });
            
            document.addEventListener('mouseup', (event) => {
                document.querySelectorAll('.white-key.active, .black-key.active').forEach(key => {
                    key.classList.remove('active');
                });
            });

            document.addEventListener('mousemove', (event) => {
                if (!isPointInsidePiano(event.clientX, event.clientY)) {
                    document.querySelectorAll('.white-key.active, .black-key.active').forEach(key => {
                        key.classList.remove('active');
                    });
                }
            });
            
            document.addEventListener('touchstart', (event) => {
                event.preventDefault();
                
                Array.from(event.touches).forEach(touch => {
                    const keyElement = document.elementFromPoint(touch.clientX, touch.clientY);
                    const pianoKey = keyElement?.closest('.white-key, .black-key');
                    
                    if (pianoKey) {
                        const note = pianoKey.dataset.note;
                        if (note) {
                            pianoKey.classList.add('active');
                            activeTouchKeys.set(touch.identifier, pianoKey);
                            
                            const noteParts = note.match(/([A-Z]#?)(\d)/);
                            if (noteParts) {
                                const frequency = pianoKey.dataset.frequency || 
                                               getPianoFrequency(noteParts[1], parseInt(noteParts[2]));
                                playNote(frequency, note);
                            }
                        }
                    }
                });
            }, { passive: false });
            
            document.addEventListener('touchmove', (event) => {
                activeTouchKeys.forEach((keyElement, touchId) => {
                    const touch = Array.from(event.touches).find(t => t.identifier === touchId);
                    
                    if (!touch) {
                        keyElement.classList.remove('active');
                        activeTouchKeys.delete(touchId);
                        return;
                    }
                    
                    if (!isPointInsidePiano(touch.clientX, touch.clientY)) {
                        keyElement.classList.remove('active');
                        activeTouchKeys.delete(touchId);
                    }
                });
            });
            
            document.addEventListener('touchend', (event) => {
                activeTouchKeys.forEach((keyElement, touchId) => {
                    const touchExists = Array.from(event.touches).some(t => t.identifier === touchId);
                    if (!touchExists) {
                        keyElement.classList.remove('active');
                        activeTouchKeys.delete(touchId);
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderPiano();
            setupKeyboardListeners();
            
            document.body.addEventListener('click', () => {
                getAudioContext();
            }, { once: true });
        });
    </script>
</body>
</html>
