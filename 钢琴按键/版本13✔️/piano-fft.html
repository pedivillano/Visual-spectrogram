<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>钢琴（拖拽 + 点击发声）</title>
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {background:#f5f5f5;}
.piano-container, .piano-container * {
    user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
}
.piano-container {position:relative; height:460px; overflow:hidden; padding:20px;}
.piano-slider {position:absolute; top:0; left:0; display:flex; align-items:flex-end; cursor:grab; transition: transform 0.08s ease-out;}
.white-key {width:80px; height:360px; background:#fff; border:1px solid #ccc; position:relative;}
.white-key span {position:absolute; bottom:-26px; width:100%; text-align:center; font-size:13px; color:#333;}
.black-keys {position:absolute; top:0; left:0; height:220px; z-index:2; pointer-events:none;}
.black-key {position:absolute; top:0; width:48px; height:220px; background:#222; border-radius:0 0 6px 6px; pointer-events:auto;}
.black-key span {position:absolute; bottom:-22px; width:100%; text-align:center; font-size:11px; color:#111;}
</style>
</head>
<body>

<div class="piano-container" id="container">
    <div class="piano-slider" id="slider"></div>
    <div class="black-keys" id="blacks"></div>
</div>

<script>
/* ===== Audio ===== */
let audioCtx = null;
function getAudioContext() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); return audioCtx;}
function playNote(freq){ const ctx=getAudioContext(); const t=ctx.currentTime; const osc=ctx.createOscillator(); const gain=ctx.createGain(); osc.type='triangle'; osc.frequency.value=freq; gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(0.8,t+0.01); gain.gain.exponentialRampToValueAtTime(0.001,t+1.4); osc.connect(gain); gain.connect(ctx.destination); osc.start(t); osc.stop(t+1.5);}

/* ===== Piano Data ===== */
const NOTES=['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
const BLACK=new Set(['A#','C#','D#','F#','G#']);
function buildData(){ const A0=27.5; return Array.from({length:88},(_,i)=>({note:NOTES[i%12], freq:A0*Math.pow(2,i/12), isBlack:BLACK.has(NOTES[i%12])}));}

/* ===== Render ===== */
function renderWhite(data, el){
    el.innerHTML='';
    data.forEach(k=>{
        if(!k.isBlack){
            const d=document.createElement('div');
            d.className='white-key';
            d.dataset.freq=k.freq;
            const label=document.createElement('span'); label.textContent=k.note; d.appendChild(label);
            el.appendChild(d);
        }
    });
}
function renderBlack(data, el){
    el.innerHTML='';
    const whiteW=document.querySelector('.white-key').offsetWidth;
    const blackW=48;
    let w=-1;
    data.forEach(k=>{
        if(!k.isBlack){ w++; return; }
        const b=document.createElement('div');
        b.className='black-key';
        b.style.left=(w*whiteW+whiteW-blackW/2)+'px';
        b.dataset.freq=k.freq;
        const label=document.createElement('span'); label.textContent=k.note; b.appendChild(label);
        el.appendChild(b);
    });
    el.style.width=document.getElementById('slider').scrollWidth+'px';
}

/* ===== Drag + Click共存 ===== */
function bindDrag(container, slider, blacks){
    let dragging=false,startX=0,startT=0,activated=false,TH=6,clickTarget=null;
    function getX(){ const t=getComputedStyle(slider).transform; return t==='none'?0:parseFloat(t.split(',')[4]); }
    function setX(x){ slider.style.transform=blacks.style.transform=`translateX(${x}px)`; }

    slider.addEventListener('pointerdown',e=>{
        slider.setPointerCapture(e.pointerId);
        startX=e.clientX; startT=getX();
        dragging=true; activated=false; clickTarget=e.target;
        slider.style.transition=blacks.style.transition='none';
    });

    slider.addEventListener('pointermove',e=>{
        if(!dragging) return;
        const dx=e.clientX-startX;
        if(!activated && Math.abs(dx)>TH){ activated=true; slider.style.cursor='grabbing'; }
        if(activated) setX(startT+dx);
    });

    slider.addEventListener('pointerup',e=>{
        if(!activated && clickTarget.dataset && clickTarget.dataset.freq){ playNote(+clickTarget.dataset.freq); }
        dragging=false; slider.releasePointerCapture(e.pointerId);
        slider.style.cursor='grab';
        slider.style.transition=blacks.style.transition='transform 0.08s ease-out';
    });
}

/* ===== Start ===== */
const data=buildData();
const slider=document.getElementById('slider');
const blacks=document.getElementById('blacks');
const container=document.getElementById('container');
renderWhite(data,slider);
renderBlack(data,blacks);
bindDrag(container,slider,blacks);
</script>

</body>
</html>
