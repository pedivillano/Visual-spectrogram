<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>钢琴（滑块控制钢琴视图）</title>
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {background:#f5f5f5; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px;}
.piano-container, .piano-container * {
    user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
}
.piano-container {position:relative; height:460px; overflow:hidden; margin-bottom:60px;}
.piano-slider {position:absolute; top:0; left:0; display:flex; align-items:flex-end; transition: transform 0.08s ease-out;}
.white-key {width:80px; height:360px; background:#fff; border:1px solid #ccc; position:relative;}
.white-key span {position:absolute; bottom:-26px; width:100%; text-align:center; font-size:13px; color:#333;}
.black-keys {position:absolute; top:0; left:0; height:220px; z-index:2; pointer-events:none;}
.black-key {position:absolute; top:0; width:48px; height:220px; background:#222; border-radius:0 0 6px 6px; pointer-events:auto;}
.black-key span {position:absolute; bottom:-22px; width:100%; text-align:center; font-size:11px; color:#fff;}

/* ===== 滑块控件 ===== */
.slider-container {width:80%; height:20px; background:#ccc; border-radius:10px; position:relative; cursor:pointer; margin-top:10px;}
.slider-thumb {width:40px; height:20px; background:#3498db; border-radius:10px; position:absolute; top:0; left:0;}
</style>
</head>
<body>

<div class="piano-container" id="container">
    <div class="piano-slider" id="slider"></div>
    <div class="black-keys" id="blacks"></div>
</div>

<div class="slider-container" id="sliderControl">
    <div class="slider-thumb" id="sliderThumb"></div>
</div>

<script>
/* ===== Audio ===== */
let audioCtx=null;
function getAudioContext(){
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
}
function playNote(freq){
    const ctx=getAudioContext();
    const t=ctx.currentTime;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type='triangle';
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.8,t+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001,t+1.4);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t+1.5);
}

/* ===== Piano Data (88键) ===== */
const NOTES_ORDER = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
const BLACK_SET = new Set(['A#','C#','D#','F#','G#']);
function buildData(){
    const A0=27.5;
    let octave=0;
    const data=[];
    for(let i=0;i<88;i++){
        const note=NOTES_ORDER[i%12];
        if(note==='C' && i!==0) octave++;
        data.push({
            note,
            octave,
            fullName: note+octave,
            freq: A0*Math.pow(2,i/12),
            isBlack: BLACK_SET.has(note)
        });
    }
    return data;
}

/* ===== Render White Keys ===== */
function renderWhite(data, el){
    el.innerHTML='';
    data.forEach(k=>{
        if(!k.isBlack){
            const d=document.createElement('div');
            d.className='white-key';
            d.dataset.freq=k.freq;
            const label=document.createElement('span');
            label.textContent=k.fullName;
            d.appendChild(label);
            d.addEventListener('pointerdown',()=>playNote(+d.dataset.freq));
            el.appendChild(d);
        }
    });
}

/* ===== Render Black Keys ===== */
function renderBlack(data, el){
    el.innerHTML='';
    const whiteKeys = document.querySelectorAll('.white-key');
    const whiteW = whiteKeys[0].offsetWidth;
    const blackW = 48;
    let w=-1;
    data.forEach(k=>{
        if(!k.isBlack){ w++; return; }
        const b=document.createElement('div');
        b.className='black-key';
        b.style.left=(w*whiteW+whiteW-blackW/2)+'px';
        b.dataset.freq=k.freq;
        const label=document.createElement('span');
        label.textContent=k.fullName;
        b.appendChild(label);
        b.addEventListener('pointerdown',()=>playNote(+b.dataset.freq));
        el.appendChild(b);
    });
    el.style.width=document.getElementById('slider').scrollWidth+'px';
}

/* ===== 滑块控制钢琴滑动 ===== */
function bindSlider(sliderEl, blacksEl, sliderContainer, thumb){
    let dragging=false,startX=0,startLeft=0;

    function updateBounds(){
        const sliderWidth = sliderEl.scrollWidth;
        const containerWidth = sliderContainer.offsetWidth;
        const maxLeft = containerWidth - thumb.offsetWidth;
        const maxTranslate = sliderWidth - containerWidth;
        return {maxLeft,maxTranslate};
    }

    let bounds = updateBounds();
    window.addEventListener('resize',()=>{ bounds = updateBounds(); });

    thumb.addEventListener('pointerdown', e=>{
        dragging = true;
        startX = e.clientX;
        startLeft = parseFloat(thumb.style.left) || 0;
        thumb.setPointerCapture(e.pointerId);
    });

    document.addEventListener('pointermove', e=>{
        if(!dragging) return;
        let dx = e.clientX - startX;
        let newLeft = startLeft + dx;
        newLeft = Math.max(0, Math.min(bounds.maxLeft, newLeft));
        thumb.style.left = newLeft+'px';
        let ratio = newLeft / bounds.maxLeft;
        let translateX = -ratio * bounds.maxTranslate;
        sliderEl.style.transform = blacksEl.style.transform = `translateX(${translateX}px)`;
    });

    document.addEventListener('pointerup', e=>{
        dragging=false;
        thumb.releasePointerCapture(e.pointerId);
    });
}

/* ===== Start ===== */
const data = buildData();
const slider=document.getElementById('slider');
const blacks=document.getElementById('blacks');
const sliderContainer=document.getElementById('sliderControl');
const thumb=document.getElementById('sliderThumb');

renderWhite(data,slider);
renderBlack(data,blacks);
bindSlider(slider,blacks,sliderContainer,thumb);
</script>

</body>
</html>
