<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>钢琴（标准按键名称显示+滑动控制滑块）</title>
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {background:#f5f5f5; padding-bottom: 80px;} /* 预留滑块区域 */
.piano-container, .piano-container * {
    user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
}
.piano-container {position:relative; height:460px; overflow:hidden; padding:20px; margin-bottom: 20px;}
.piano-slider {position:absolute; top:0; left:0; display:flex; align-items:flex-end; cursor:grab; transition: transform 0.08s ease-out;}
.white-key {width:80px; height:360px; background:#fff; border:1px solid #ccc; position:relative;}
.white-key span {position:absolute; bottom:-26px; width:100%; text-align:center; font-size:13px; color:#333;}
.black-keys {position:absolute; top:0; left:0; height:220px; z-index:2; pointer-events:none;}
.black-key {position:absolute; top:0; width:48px; height:220px; background:#222; border-radius:0 0 6px 6px; pointer-events:auto;}
.black-key span {position:absolute; bottom:-22px; width:100%; text-align:center; font-size:11px; color:#111;}

/* ===== 新增：滑动控制滑块样式 ===== */
.slider-control {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 15px;
}
.slider-track {
    flex: 1;
    height: 8px;
    background: #e0e0e0;
    border-radius: 4px;
    position: relative;
    cursor: pointer;
}
.slider-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 24px;
    height: 24px;
    background: #3498db;
    border-radius: 50%;
    cursor: grab;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: background 0.2s ease;
}
.slider-thumb:active {
    cursor: grabbing;
    background: #2980b9;
}
.slider-label {
    font-size: 14px;
    color: #666;
    white-space: nowrap;
}
</style>
</head>
<body>

<div class="piano-container" id="container">
    <div class="piano-slider" id="slider"></div>
    <div class="black-keys" id="blacks"></div>
</div>

<!-- ===== 新增：滑动控制滑块DOM ===== -->
<div class="slider-control">
    <span class="slider-label">琴键视图滑动</span>
    <div class="slider-track" id="sliderTrack">
        <div class="slider-thumb" id="sliderThumb"></div>
    </div>
</div>

<script>
/* ===== Audio ===== */
let audioCtx=null;
function getAudioContext(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended')audioCtx.resume(); return audioCtx;}
function playNote(freq){const ctx=getAudioContext(); const t=ctx.currentTime; const osc=ctx.createOscillator(); const gain=ctx.createGain(); osc.type='triangle'; osc.frequency.value=freq; gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(0.8,t+0.01); gain.gain.exponentialRampToValueAtTime(0.001,t+1.4); osc.connect(gain); gain.connect(ctx.destination); osc.start(t); osc.stop(t+1.5);}

/* ===== Piano Data (88键标准钢琴) ===== */
const NOTES_ORDER = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
const BLACK_SET = new Set(['A#','C#','D#','F#','G#']);
function buildData(){
    const A0 = 27.5;
    let octave = 0;
    const data=[];
    for(let i=0;i<88;i++){
        const note = NOTES_ORDER[i%12];
        if(note==='C' && i!==0) octave++;
        data.push({
            note,
            octave,
            fullName: note + octave,
            freq: A0 * Math.pow(2,i/12),
            isBlack: BLACK_SET.has(note)
        });
    }
    return data;
}

/* ===== Render White Keys ===== */
function renderWhite(data, el){
    el.innerHTML='';
    data.forEach(k=>{
        if(!k.isBlack){
            const d=document.createElement('div');
            d.className='white-key';
            d.dataset.freq=k.freq;
            const label=document.createElement('span');
            label.textContent=k.fullName;
            d.appendChild(label);
            el.appendChild(d);
        }
    });
}

/* ===== Render Black Keys ===== */
function renderBlack(data, el){
    el.innerHTML='';
    const whiteW=document.querySelector('.white-key').offsetWidth;
    const blackW=48;
    let w=-1;
    data.forEach(k=>{
        if(!k.isBlack){w++; return;}
        const b=document.createElement('div');
        b.className='black-key';
        b.style.left=(w*whiteW+whiteW-blackW/2)+'px';
        b.dataset.freq=k.freq;
        const label=document.createElement('span');
        label.textContent=k.fullName;
        b.appendChild(label);
        el.appendChild(b);
    });
    el.style.width=document.getElementById('slider').scrollWidth+'px';
}

/* ===== 全局变量：滑动相关（新增） ===== */
let maxScrollX = 0; // 琴键最大左滑距离（边界值）
const sliderTrack = document.getElementById('sliderTrack');
const sliderThumb = document.getElementById('sliderThumb');

/* ===== 工具方法：计算并设置滑动边界（新增） ===== */
function calcMaxScroll() {
    const containerWidth = document.getElementById('container').clientWidth;
    const pianoTotalWidth = document.getElementById('slider').scrollWidth;
    maxScrollX = Math.max(0, pianoTotalWidth - containerWidth);
    // 设置滑块可拖动宽度（轨道宽度 - 滑块宽度）
    const trackWidth = sliderTrack.offsetWidth;
    sliderThumb.style.maxLeft = `${trackWidth - sliderThumb.offsetWidth}px`;
}

/* ===== 工具方法：琴键位置 ↔ 滑块位置 双向转换（核心新增） ===== */
// 琴键X坐标 → 滑块左偏移量
function pianoXToThumbLeft(pianoX) {
    const trackUsableWidth = sliderTrack.offsetWidth - sliderThumb.offsetWidth;
    // 琴键X范围：0 → -maxScrollX 对应 滑块左偏移：0 → trackUsableWidth
    return trackUsableWidth * (Math.abs(pianoX) / maxScrollX) || 0;
}
// 滑块左偏移量 → 琴键X坐标
function thumbLeftToPianoX(thumbLeft) {
    const trackUsableWidth = sliderTrack.offsetWidth - sliderThumb.offsetWidth;
    // 滑块左偏移：0 → trackUsableWidth 对应 琴键X范围：0 → -maxScrollX
    return -((thumbLeft / trackUsableWidth) * maxScrollX) || 0;
}

/* ===== 工具方法：设置琴键位置（带边界限制，修改原有逻辑） ===== */
function setPianoX(x) {
    const container = document.getElementById('container');
    const slider = document.getElementById('slider');
    const blacks = document.getElementById('blacks');
    // 边界限制：琴键X不能超过0（最右），不能小于 -maxScrollX（最左）
    const clampedX = Math.max(-maxScrollX, Math.min(0, x));
    slider.style.transform = blacks.style.transform = `translateX(${clampedX}px)`;
    // 同步更新滑块位置
    sliderThumb.style.left = `${pianoXToThumbLeft(clampedX)}px`;
}

/* ===== 工具方法：获取当前琴键X坐标（原有逻辑提取） ===== */
function getPianoX() {
    const slider = document.getElementById('slider');
    const t = getComputedStyle(slider).transform;
    return t === 'none' ? 0 : parseFloat(t.split(',')[4]) || 0;
}

/* ===== Drag + Click 共存（修改原有逻辑，适配新的setPianoX） ===== */
function bindDrag(container, slider, blacks){
    let dragging=false,startX=0,startT=0,activated=false,TH=6,clickTarget=null;

    slider.addEventListener('pointerdown',e=>{
        slider.setPointerCapture(e.pointerId);
        startX=e.clientX; startT=getPianoX();
        dragging=true; activated=false; clickTarget=e.target;
        slider.style.transition=blacks.style.transition='none';
    });

    slider.addEventListener('pointermove',e=>{
        if(!dragging) return;
        const dx=e.clientX-startX;
        if(!activated && Math.abs(dx)>TH){ activated=true; slider.style.cursor='grabbing'; }
        if(activated) setPianoX(startT+dx); // 使用新的设置方法
    });

    slider.addEventListener('pointerup',e=>{
        if(!activated && clickTarget.dataset && clickTarget.dataset.freq){ playNote(+clickTarget.dataset.freq); }
        dragging=false; slider.releasePointerCapture(e.pointerId);
        slider.style.cursor='grab';
        slider.style.transition=blacks.style.transition='transform 0.08s ease-out';
    });
}

/* ===== 新增：绑定滑块拖动事件 ===== */
function bindSliderControl() {
    let isDraggingThumb = false;
    let startThumbLeft = 0;
    let startPianoX = 0;

    // 滑块鼠标按下
    sliderThumb.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isDraggingThumb = true;
        startThumbLeft = parseFloat(sliderThumb.style.left) || 0;
        startPianoX = getPianoX();
        sliderThumb.style.cursor = 'grabbing';
        document.body.style.userSelect = 'none';
    });

    // 滑块鼠标移动
    document.addEventListener('mousemove', (e) => {
        if (!isDraggingThumb) return;
        e.preventDefault();
        // 计算鼠标相对轨道的偏移
        const trackRect = sliderTrack.getBoundingClientRect();
        const currentThumbLeft = e.clientX - trackRect.left - (sliderThumb.offsetWidth / 2);
        // 边界限制：0 ~ 最大可拖动宽度
        const clampedLeft = Math.max(0, Math.min(parseFloat(sliderThumb.style.maxLeft), currentThumbLeft));
        // 转换为琴键位置并设置
        setPianoX(thumbLeftToPianoX(clampedLeft));
    });

    // 滑块鼠标松开
    document.addEventListener('mouseup', () => {
        if (isDraggingThumb) {
            isDraggingThumb = false;
            sliderThumb.style.cursor = 'grab';
            document.body.style.userSelect = 'auto';
        }
    });

    // 点击轨道任意位置，滑块跳转到对应位置
    sliderTrack.addEventListener('click', (e) => {
        const trackRect = sliderTrack.getBoundingClientRect();
        const clickLeft = e.clientX - trackRect.left - (sliderThumb.offsetWidth / 2);
        const clampedLeft = Math.max(0, Math.min(parseFloat(sliderThumb.style.maxLeft), clickLeft));
        setPianoX(thumbLeftToPianoX(clampedLeft));
    });

    // 窗口大小变化，重新计算边界并更新滑块
    window.addEventListener('resize', () => {
        calcMaxScroll();
        setPianoX(getPianoX()); // 重新设置琴键位置，同步滑块
    });
}

/* ===== Start ===== */
const data=buildData();
const slider=document.getElementById('slider');
const blacks=document.getElementById('blacks');
const container=document.getElementById('container');

// 初始化渲染
renderWhite(data,slider);
renderBlack(data,blacks);
// 计算滑动边界（新增）
calcMaxScroll();
// 绑定事件
bindDrag(container,slider,blacks);
bindSliderControl(); // 绑定滑块控制事件（新增）
// 初始化滑块位置（新增）
sliderThumb.style.left = `${pianoXToThumbLeft(getPianoX())}px`;
</script>

</body>
</html>
