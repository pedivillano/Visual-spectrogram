<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钢琴按键频率表 + FFT参数对照（最终精准版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            overflow-x: hidden;
        }

        /* FFT参数表样式 - 顶部固定粘性布局 */
        .fft-table-container {
            width: 100%;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
            margin-bottom: 40px;
        }

        .fft-table-container h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #2c3e50;
            font-size: 20px;
        }

        .fft-table {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-collapse: collapse;
            text-align: center;
        }

        .fft-table th, .fft-table td {
            border: 1px solid #ddd;
            padding: 12px 8px;
        }

        .fft-table th {
            background-color: #3498db;
            color: #fff;
            font-weight: bold;
        }

        .fft-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .fft-table tr:hover {
            background-color: #e3f2fd;
        }

        /* 钢琴整体容器 - 包含琴键+上下外部标注 */
        .piano-wrap {
            width: 100%;
            padding: 0 20px;
            position: relative;
            height: 500px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* 钢琴滑动容器 - 整体拖拽滑动，带过渡效果 */
        .piano-scroll {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 0;
            cursor: grab;
            transition: transform 0.08s ease-out;
        }
        .piano-scroll:active {
            cursor: grabbing;
        }

        /* 单个琴键单元 - 白键基础单元，包含：黑键标注+琴键+白键标注 */
        .key-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 80px; /* 电脑端白键宽度（核心加宽） */
            height: 100%;
        }

        /* 黑键顶部外部标注 - 仅黑键显示，精准居中黑键 */
        .black-note-label {
            position: absolute;
            top: 10px;
            color: #2c3e50;
            font-size: 14px;
            font-weight: 500;
            z-index: 3;
            text-align: center;
            width: 48px; /* 与黑键同宽 */
            display: none; /* 默认隐藏，黑键位置才显示 */
        }
        /* 黑键位置显示标注 */
        .key-unit.has-black .black-note-label {
            display: block;
        }

        /* 琴键容器 - 承载白键和黑键，相对定位 */
        .key-box {
            position: relative;
            width: 100%;
            height: 380px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* 白键样式 - 80px宽，标准钢琴白键样式 */
        .white-key {
            width: 100%;
            height: 100%;
            background-color: #fff;
            border: 1px solid #ccc;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            position: relative;
            z-index: 1;
            transition: background-color 0.2s ease;
        }
        .white-key:hover {
            background-color: #f0f8ff;
        }

        /* 黑键样式 - 48px宽，精准居中偏移，无重叠 */
        .black-key {
            position: absolute;
            top: 0;
            left: calc(50% - 24px); /* 核心偏移：50% - 黑键宽度/2，精准居中两个白键中间 */
            width: 48px; /* 电脑端黑键宽度 */
            height: 240px;
            background-color: #222;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            z-index: 2;
            transition: background-color 0.2s ease;
            cursor: pointer;
            display: none; /* 默认隐藏，黑键位置才显示 */
        }
        /* 标记黑键位置，显示黑键 */
        .key-unit.has-black .black-key {
            display: block;
        }
        .black-key:hover {
            background-color: #444;
        }

        /* 白键底部外部标注 - 仅白键显示，正下方居中 */
        .white-note-label {
            position: absolute;
            bottom: 10px;
            color: #2c3e50;
            font-size: 14px;
            line-height: 1.5;
            text-align: center;
            width: 100%;
            z-index: 3;
        }
        .white-note-label .freq {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        /* 滑动提示 */
        .scroll-tip {
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* 响应式适配 - 平板/手机端等比例缩放，黑键同步偏移 */
        @media (max-width: 768px) {
            .piano-wrap {
                height: 400px;
            }
            .key-unit {
                width: 60px; /* 平板端白键宽度 */
            }
            .black-key {
                width: 36px; /* 平板端黑键宽度 */
                height: 180px;
                left: calc(50% - 18px); /* 同步偏移：50% - 黑键宽度/2 */
            }
            .black-note-label {
                font-size: 12px;
                width: 36px; /* 与平板端黑键同宽 */
                top: 8px;
            }
            .white-note-label {
                font-size: 12px;
                bottom: 8px;
            }
            .white-note-label .freq {
                font-size: 10px;
            }
            .key-box {
                height: 280px;
            }
        }

        @media (max-width: 480px) {
            .key-unit {
                width: 45px; /* 手机端白键宽度 */
            }
            .black-key {
                width: 27px; /* 手机端黑键宽度 */
                height: 140px;
                left: calc(50% - 13.5px); /* 同步偏移：50% - 黑键宽度/2 */
            }
            .black-note-label {
                font-size: 10px;
                width: 27px; /* 与手机端黑键同宽 */
            }
            .white-note-label {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- FFT参数对照表 - 顶部固定，采样率44100Hz -->
    <div class="fft-table-container">
        <h2>FFT 窗口长度与分析参数对照表（采样率 fs = 44100 Hz）</h2>
        <table class="fft-table">
            <thead>
                <tr>
                    <th>FFT窗口长度 N</th>
                    <th>分析片段长度 T = N/fs</th>
                    <th>频率精度 Δf = fs/N（Hz）</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>256</td>
                    <td>≈ 0.0058 s（5.8 ms）</td>
                    <td>≈ 172.27</td>
                </tr>
                <tr>
                    <td>512</td>
                    <td>≈ 0.0116 s（11.6 ms）</td>
                    <td>≈ 86.13</td>
                </tr>
                <tr>
                    <td>1024</td>
                    <td>≈ 0.0232 s（23.2 ms）</td>
                    <td>≈ 43.07</td>
                </tr>
                <tr>
                    <td>2048</td>
                    <td>≈ 0.0464 s（46.4 ms）</td>
                    <td>≈ 21.53</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 钢琴整体容器（含上下外部标注+精准定位黑键） -->
    <div class="piano-wrap" id="pianoWrap">
        <div class="piano-scroll" id="pianoScroll"></div>
    </div>

    <!-- 操作提示 -->
    <div class="scroll-tip">
        👉 鼠标拖动/键盘左右箭头 滑动钢琴 | 88键标准布局 | 白键<u>下方外部</u>：音名+中文+频率 | 黑键<u>上方外部</u>：精准频率 | 黑键精准定位+正常拖拽逻辑
    </div>

    <script>
        // 88键钢琴核心类 - 十二平均律（A4=440Hz，A0(27.5Hz)~C8(4186.01Hz)）
        class Piano {
            constructor() {
                this.A4 = 440.0; // 基准音频率（国际标准）
                this.A4KeyIndex = 48; // A4是88键第49个键（索引48，从0开始）
                this.keys = []; // 存储所有88键信息
                this.blackKeyPositions = [1,3,6,8,10]; // 12平均律中黑键的位置索引（C#/D#/F#/G#/A#）
                this.pianoScroll = document.getElementById('pianoScroll');
                this.pianoWrap = document.getElementById('pianoWrap');
                this.scrollMaxX = 0; // 滑动边界最大值（防止滑出空白）

                this.initKeys(); // 初始化88键音名/频率/中文名称
                this.renderPiano(); // 渲染琴键+外部标注+精准黑键
                this.calcScrollBoundary(); // 计算滑动边界
                this.bindEvents(); // 绑定正常拖拽/键盘/触摸事件
            }

            // 十二平均律频率计算公式：f = A4 * 2^((键索引 - A4索引)/12)
            calculateFreq(keyIndex) {
                return this.A4 * Math.pow(2, (keyIndex - this.A4KeyIndex) / 12);
            }

            // 初始化88键完整信息：音名、八度、中文名称、频率、是否黑键
            initKeys() {
                const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B']; // 12音名循环
                const chineseNames = { 'C':'哆','D':'来','E':'咪','F':'发','G':'索','A':'拉','B':'西' }; // 白键中文对照
                let octave = 0; // 八度从0开始（A0为起始）
                let noteIndex = 9; // 88键起始音为A0（对应noteNames[9]）

                for (let i = 0; i < 88; i++) {
                    const freq = this.calculateFreq(i);
                    let note = noteNames[noteIndex];
                    const isBlack = note.includes('#'); // 带#为黑键
                    let fullNoteName = `${note}${octave}`;
                    let chinese = isBlack ? `升${chineseNames[note.replace('#', '')]}${octave}` : chineseNames[note] || '';
                    // 标记是否为黑键显示位置（用于渲染黑键）
                    const isBlackKeyPos = this.blackKeyPositions.includes(i % 12);

                    // 存入88键完整信息
                    this.keys.push({
                        index: i,
                        freq: freq,
                        note: fullNoteName,
                        chinese: chinese,
                        isBlack,
                        isBlackKeyPos
                    });

                    // 八度递增规则：B音（noteIndex=11）后升八度
                    if (noteIndex === 11) {
                        noteIndex = 0;
                        octave++;
                    } else {
                        noteIndex++;
                    }

                    // 最后一个键特殊修正：88键结束音为C8
                    if (i === 87) {
                        this.keys[i] = {
                            ...this.keys[i],
                            note: 'C8',
                            chinese: '哆8',
                            isBlack: false,
                            isBlackKeyPos: false
                        };
                    }
                }
            }

            // 渲染钢琴：精准黑键定位+外部上下标注+无错位布局
            renderPiano() {
                let pianoHtml = '';
                this.keys.forEach(key => {
                    // 黑键顶部外部标注（仅黑键显示，频率保留1位小数）
                    const blackLabel = `<div class="black-note-label">${key.freq.toFixed(1)} Hz</div>`;
                    // 白键底部外部标注（音名+中文+频率，完全脱离琴键）
                    const whiteLabel = `
                        <div class="white-note-label">
                            <span>${key.note}</span><br>
                            <span>${key.chinese}</span>
                            <div class="freq">${key.freq.toFixed(1)} Hz</div>
                        </div>
                    `;
                    // 给黑键位置的单元添加标记类，用于显示黑键和黑键标注
                    const keyUnitClass = key.isBlackKeyPos ? 'key-unit has-black' : 'key-unit';

                    // 单个琴键单元：白键为基础，黑键精准居中偏移，标注在外部
                    pianoHtml += `
                        <div class="${keyUnitClass}">
                            ${blackLabel}
                            <div class="key-box">
                                <div class="white-key"></div>
                                <div class="black-key"></div>
                            </div>
                            ${whiteLabel}
                        </div>
                    `;
                });
                this.pianoScroll.innerHTML = pianoHtml;
            }

            // 计算滑动边界：防止拖拽超出琴键范围，无空白区域
            calcScrollBoundary() {
                const wrapWidth = this.pianoWrap.clientWidth;
                const scrollWidth = this.pianoScroll.scrollWidth;
                this.scrollMaxX = Math.max(0, scrollWidth - wrapWidth);
            }

            // 限制滑动范围：左滑最大为-scrollMaxX，右滑最大为0
            clampTransformX(x) {
                return Math.max(-this.scrollMaxX, Math.min(0, x));
            }

            // 绑定所有交互事件：正常拖拽+键盘箭头+触摸+窗口自适应
            bindEvents() {
                let startX = 0;
                let startTransformX = 0;
                let isDragging = false;

                // 窗口大小变化时重新计算边界，防止错位
                window.addEventListener('resize', () => {
                    this.calcScrollBoundary();
                    const currentX = this.getTransformX();
                    this.setTransformX(this.clampTransformX(currentX));
                });

                // 鼠标按下：记录初始位置，取消过渡更跟手
                this.pianoScroll.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    startX = e.clientX;
                    startTransformX = this.getTransformX();
                    this.pianoScroll.style.transition = 'none';
                    document.body.style.userSelect = 'none'; // 防止选中文本
                });

                // 鼠标移动：正常拖拽逻辑（核心：左拖左滑，右拖右滑，无反向）
                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    e.preventDefault();
                    const dx = e.clientX - startX; // 鼠标移动偏移量
                    let newX = startTransformX + dx; // 新滑动位置
                    newX = this.clampTransformX(newX); // 边界限制
                    this.setTransformX(newX); // 应用位置
                });

                // 鼠标松开/离开：结束拖拽，恢复样式和过渡
                const endDrag = () => {
                    if (isDragging) {
                        isDragging = false;
                        this.pianoScroll.style.transition = 'transform 0.08s ease-out';
                        document.body.style.userSelect = 'auto';
                    }
                };
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('mouseleave', endDrag);

                // 键盘左右箭头：精准滑动，每次200px，带边界限制
                document.addEventListener('keydown', (e) => {
                    const scrollStep = 200;
                    let currentX = this.getTransformX();
                    if (e.key === 'ArrowLeft') currentX -= scrollStep; // 左箭头：钢琴左滑（看右侧）
                    else if (e.key === 'ArrowRight') currentX += scrollStep; // 右箭头：钢琴右滑（看左侧）
                    this.setTransformX(this.clampTransformX(currentX));
                });

                // 触摸事件：适配手机/平板，与鼠标拖拽逻辑完全一致
                this.pianoScroll.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startTransformX = this.getTransformX();
                    this.pianoScroll.style.transition = 'none';
                });
                this.pianoScroll.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - startX;
                    let newX = startTransformX + dx;
                    this.setTransformX(this.clampTransformX(newX));
                });
                this.pianoScroll.addEventListener('touchend', () => {
                    this.pianoScroll.style.transition = 'transform 0.08s ease-out';
                });
            }

            // 工具方法：获取当前滑动的X坐标（从transform中解析）
            getTransformX() {
                const transform = window.getComputedStyle(this.pianoScroll).transform;
                if (transform === 'none') return 0;
                const x = parseFloat(transform.split(',')[4] || 0);
                return isNaN(x) ? 0 : x;
            }

            // 工具方法：设置滑动的X坐标（应用到transform样式）
            setTransformX(x) {
                this.pianoScroll.style.transform = `translateX(${x}px)`;
            }
        }

        // 页面加载完成后初始化钢琴（确保DOM渲染完毕）
        window.onload = () => {
            new Piano();
        };
    </script>
</body>
</html>
