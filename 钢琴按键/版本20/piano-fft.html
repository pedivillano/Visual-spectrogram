<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>钢琴（标准按键名称显示 + 频率显示 + 滑动控制）</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {background:#f5f5f5; padding-bottom:80px;}

.piano-container, .piano-container * {
    user-select:none;
    -webkit-user-select:none;
    -webkit-user-drag:none;
}

.piano-container {
    position:relative;
    height:460px;
    overflow:hidden;
    padding:20px;
    margin-bottom:20px;
}

.piano-slider {
    position:absolute;
    top:0;
    left:0;
    display:flex;
    align-items:flex-end;
    cursor:grab;
    transition:transform 0.08s ease-out;
}

/* ===== 白键 ===== */
.white-key {
    width:80px;
    height:360px;
    background:#fff;
    border:1px solid #ccc;
    position:relative;
}

.white-key-info {
    position:absolute;
    bottom:-40px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.white-key .note-name {
    font-size:13px;
    color:#333;
    font-weight:500;
    line-height:1.2;
}

.white-key .note-freq {
    font-size:11px;
    color:#666;
    line-height:1.2;
}

/* ===== 黑键 ===== */
.black-keys {
    position:absolute;
    top:0;
    left:0;
    height:220px;
    z-index:2;
    pointer-events:none;
}

.black-key {
    position:absolute;
    top:0;
    width:48px;
    height:220px;
    background:#222;
    border-radius:0 0 6px 6px;
    pointer-events:auto;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;
    padding-bottom:10px;
}

.black-key-info {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    width:100%;
}

.black-key .note-name {
    font-size:12px;
    color:#fff;
    font-weight:500;
    line-height:1.1;
    text-shadow:0 1px 2px rgba(0,0,0,0.7);
}

.black-key .note-freq {
    font-size:9px;
    color:#ccc;
    line-height:1.1;
    text-shadow:0 1px 2px rgba(0,0,0,0.7);
}

/* ===== 滑块控制 ===== */
.slider-control {
    width:100%;
    max-width:1400px;
    margin:0 auto;
    padding:0 20px;
    display:flex;
    align-items:center;
    gap:15px;
}

.slider-track {
    flex:1;
    height:8px;
    background:#e0e0e0;
    border-radius:4px;
    position:relative;
    cursor:pointer;
}

.slider-thumb {
    position:absolute;
    top:50%;
    transform:translate(-50%, -50%);
    width:24px;
    height:24px;
    background:#3498db;
    border-radius:50%;
    cursor:grab;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* ===== 按键悬停效果 ===== */
.white-key:hover {
    background:#f9f9f9;
}

.black-key:hover {
    background:#333;
}

/* 添加响应式调整 */
@media (max-width: 768px) {
    .white-key {
        width:70px;
    }
    
    .white-key-info {
        bottom:-36px;
    }
    
    .white-key .note-name {
        font-size:12px;
    }
    
    .white-key .note-freq {
        font-size:10px;
    }
    
    .black-key {
        width:42px;
    }
    
    .black-key .note-name {
        font-size:11px;
    }
    
    .black-key .note-freq {
        font-size:8px;
    }
}
</style>
</head>

<body>

<div class="piano-container" id="container">
    <div class="piano-slider" id="slider"></div>
    <div class="black-keys" id="blacks"></div>
</div>

<div class="slider-control">
    <span class="slider-label">琴键视图滑动</span>
    <div class="slider-track" id="sliderTrack">
        <div class="slider-thumb" id="sliderThumb"></div>
    </div>
</div>

<script>
/* ===== Audio ===== */
let audioCtx=null;
function getAudioContext(){
    if(!audioCtx){
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    }
    if(audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
}

function playNote(freq){
    const ctx=getAudioContext();
    const t=ctx.currentTime;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type='triangle';
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.8,t+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001,t+1.4);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t+1.5);
}

/* ===== Piano Data ===== */
const NOTES_ORDER=['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
const BLACK_SET=new Set(['A#','C#','D#','F#','G#']);

function buildData(){
    const A0=27.5;
    let octave=0;
    const data=[];
    for(let i=0;i<88;i++){
        const note=NOTES_ORDER[i%12];
        if(note==='C' && i!==0) octave++;
        data.push({
            note,
            octave,
            fullName:note+octave,
            freq:A0*Math.pow(2,i/12),
            isBlack:BLACK_SET.has(note)
        });
    }
    return data;
}

/* ===== Render White Keys ===== */
function renderWhite(data, el){
    el.innerHTML='';
    data.forEach(k=>{
        if(!k.isBlack){
            const d=document.createElement('div');
            d.className='white-key';
            d.dataset.freq=k.freq;
            d.dataset.name=k.fullName;

            const infoDiv=document.createElement('div');
            infoDiv.className='white-key-info';
            
            const label=document.createElement('div');
            label.className='note-name';
            label.textContent=k.fullName;

            const freq=document.createElement('div');
            freq.className='note-freq';
            freq.textContent=k.freq.toFixed(2)+' Hz';

            infoDiv.appendChild(label);
            infoDiv.appendChild(freq);
            d.appendChild(infoDiv);
            el.appendChild(d);
        }
    });
}

/* ===== Render Black Keys ===== */
function renderBlack(data, el){
    el.innerHTML='';
    const whiteW=document.querySelector('.white-key').offsetWidth;
    const blackW=48;
    let w=-1;

    data.forEach(k=>{
        if(!k.isBlack){ w++; return; }

        const b=document.createElement('div');
        b.className='black-key';
        b.style.left=(w*whiteW+whiteW-blackW/2)+'px';
        b.dataset.freq=k.freq;
        b.dataset.name=k.fullName;

        const infoDiv=document.createElement('div');
        infoDiv.className='black-key-info';
        
        const label=document.createElement('div');
        label.className='note-name';
        label.textContent=k.fullName;

        const freq=document.createElement('div');
        freq.className='note-freq';
        freq.textContent=k.freq.toFixed(2)+' Hz';

        infoDiv.appendChild(label);
        infoDiv.appendChild(freq);
        b.appendChild(infoDiv);
        el.appendChild(b);
    });

    el.style.width=document.getElementById('slider').scrollWidth+'px';
}

/* ===== 滑动相关 ===== */
let maxScrollX=0;
const sliderTrack=document.getElementById('sliderTrack');
const sliderThumb=document.getElementById('sliderThumb');

function calcMaxScroll(){
    const containerWidth=container.clientWidth;
    const pianoTotalWidth=slider.scrollWidth;
    maxScrollX=Math.max(0,pianoTotalWidth-containerWidth);
    sliderThumb.style.maxLeft=(sliderTrack.offsetWidth-sliderThumb.offsetWidth)+'px';
}

function pianoXToThumbLeft(x){
    const w=sliderTrack.offsetWidth-sliderThumb.offsetWidth;
    return w*(Math.abs(x)/maxScrollX)||0;
}
function thumbLeftToPianoX(left){
    const w=sliderTrack.offsetWidth-sliderThumb.offsetWidth;
    return -((left/w)*maxScrollX)||0;
}

function setPianoX(x){
    const clamped=Math.max(-maxScrollX,Math.min(0,x));
    slider.style.transform=blacks.style.transform=`translateX(${clamped}px)`;
    sliderThumb.style.left=pianoXToThumbLeft(clamped)+'px';
}
function getPianoX(){
    const t=getComputedStyle(slider).transform;
    return t==='none'?0:parseFloat(t.split(',')[4])||0;
}

/* ===== Drag + Click ===== */
function bindDrag(container,slider,blacks){
    let dragging=false,startX=0,startT=0,activated=false,TH=6,clickTarget=null;

    slider.addEventListener('pointerdown',e=>{
        slider.setPointerCapture(e.pointerId);
        startX=e.clientX;
        startT=getPianoX();
        dragging=true;
        activated=false;
        clickTarget=e.target;
        slider.style.transition=blacks.style.transition='none';
    });

    slider.addEventListener('pointermove',e=>{
        if(!dragging) return;
        const dx=e.clientX-startX;
        if(!activated && Math.abs(dx)>TH){
            activated=true;
            slider.style.cursor='grabbing';
        }
        if(activated) setPianoX(startT+dx);
    });

    slider.addEventListener('pointerup',e=>{
        if(!activated && clickTarget?.dataset?.freq){
            playNote(+clickTarget.dataset.freq);
        }
        dragging=false;
        slider.releasePointerCapture(e.pointerId);
        slider.style.cursor='grab';
        slider.style.transition=blacks.style.transition='transform 0.08s ease-out';
    });
}

/* ===== Slider Control ===== */
function bindSliderControl(){
    let dragging=false;

    sliderThumb.addEventListener('mousedown',e=>{
        dragging=true;
        document.body.style.userSelect='none';
    });

    document.addEventListener('mousemove',e=>{
        if(!dragging) return;
        const rect=sliderTrack.getBoundingClientRect();
        const left=e.clientX-rect.left-sliderThumb.offsetWidth/2;
        const clamped=Math.max(0,Math.min(parseFloat(sliderThumb.style.maxLeft),left));
        setPianoX(thumbLeftToPianoX(clamped));
    });

    document.addEventListener('mouseup',()=>{
        dragging=false;
        document.body.style.userSelect='auto';
    });

    sliderTrack.addEventListener('click',e=>{
        const rect=sliderTrack.getBoundingClientRect();
        const left=e.clientX-rect.left-sliderThumb.offsetWidth/2;
        const clamped=Math.max(0,Math.min(parseFloat(sliderThumb.style.maxLeft),left));
        setPianoX(thumbLeftToPianoX(clamped));
    });

    window.addEventListener('resize',()=>{
        calcMaxScroll();
        setPianoX(getPianoX());
    });
}

/* ===== Start ===== */
const data=buildData();
const slider=document.getElementById('slider');
const blacks=document.getElementById('blacks');
const container=document.getElementById('container');

renderWhite(data,slider);
renderBlack(data,blacks);
calcMaxScroll();
bindDrag(container,slider,blacks);
bindSliderControl();
sliderThumb.style.left=pianoXToThumbLeft(getPianoX())+'px';
</script>

</body>
</html>
