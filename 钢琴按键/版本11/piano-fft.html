<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>可发声钢琴（Edge 拖拽 + Pointer Events）</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body { background: #f5f5f5; }

.piano-container,
.piano-container * {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    -webkit-user-drag: none;
}

.piano-container {
    position: relative;
    height: 420px;
    overflow: hidden;
    padding: 20px;
}

.piano-slider {
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    align-items: flex-end;
    cursor: grab;
    transition: transform 0.08s ease-out;
}

.white-key {
    width: 80px;
    height: 360px;
    background: #fff;
    border: 1px solid #ccc;
}

.black-keys {
    position: absolute;
    top: 0;
    left: 0;
    height: 220px;
    z-index: 2;
    pointer-events: none;
}

.black-key {
    position: absolute;
    top: 0;
    width: 48px;
    height: 220px;
    background: #222;
    border-radius: 0 0 6px 6px;
    pointer-events: auto;
}
</style>
</head>

<body>

<div class="piano-container" id="container">
    <div class="piano-slider" id="slider"></div>
    <div class="black-keys" id="blacks"></div>
</div>

<script>
/* ===== Audio Engine ===== */
let audioCtx = null;

function getAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume(); // ★ Edge / Chrome 必须
    }
    return audioCtx;
}

function playNote(freq) {
    if (!freq) return;

    const ctx = getAudioContext();
    const t = ctx.currentTime;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = 'triangle';
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.8, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(t);
    osc.stop(t + 1.6);
}

/* ===== Piano Data ===== */
const NOTES = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
const BLACK_SET = new Set(['A#','C#','D#','F#','G#']);
const TOTAL = 88;

function buildData() {
    const data = [];
    const A0 = 27.5;

    for (let i = 0; i < TOTAL; i++) {
        const freq = A0 * Math.pow(2, i / 12);
        const note = NOTES[i % 12];

        data.push({
            note,
            freq,
            isBlack: BLACK_SET.has(note)
        });
    }
    return data;
}

/* ===== Render White ===== */
function renderWhite(data, el) {
    el.innerHTML = '';

    data.forEach(k => {
        if (!k.isBlack) {
            const key = document.createElement('div');
            key.className = 'white-key';
            key.dataset.freq = k.freq;

            key.addEventListener('pointerdown', e => {
                e.stopPropagation();
                playNote(+key.dataset.freq);
            });

            el.appendChild(key);
        }
    });
}

/* ===== Render Black ===== */
function renderBlack(data, el) {
    el.innerHTML = '';

    const whiteW = document.querySelector('.white-key').offsetWidth;
    const blackW = 48;
    let whiteIndex = -1;

    data.forEach(k => {
        if (!k.isBlack) {
            whiteIndex++;
            return;
        }

        const left = whiteIndex * whiteW + whiteW - blackW / 2;

        const b = document.createElement('div');
        b.className = 'black-key';
        b.style.left = left + 'px';
        b.dataset.freq = k.freq;

        b.addEventListener('pointerdown', e => {
            e.stopPropagation();
            playNote(+b.dataset.freq);
        });

        el.appendChild(b);
    });

    el.style.width = document.getElementById('slider').scrollWidth + 'px';
}

/* ===== Drag ===== */
function bindDrag(container, slider, blacks) {
    let dragging = false;
    let startX = 0;
    let startT = 0;
    let maxX = 0;

    function calcBounds() {
        maxX = Math.max(0, slider.scrollWidth - container.clientWidth);
    }

    function setX(x) {
        x = Math.max(-maxX, Math.min(0, x));
        slider.style.transform = `translateX(${x}px)`;
        blacks.style.transform = `translateX(${x}px)`;
    }

    function getX() {
        const t = getComputedStyle(slider).transform;
        return t === 'none' ? 0 : parseFloat(t.split(',')[4]);
    }

    calcBounds();
    window.addEventListener('resize', () => {
        calcBounds();
        setX(getX());
    });

    slider.addEventListener('pointerdown', e => {
        e.preventDefault();
        slider.setPointerCapture(e.pointerId);
        dragging = true;
        startX = e.clientX;
        startT = getX();
        slider.style.transition = blacks.style.transition = 'none';
        slider.style.cursor = 'grabbing';
    });

    slider.addEventListener('pointermove', e => {
        if (!dragging) return;
        setX(startT + e.clientX - startX);
    });

    slider.addEventListener('pointerup', e => {
        dragging = false;
        slider.releasePointerCapture(e.pointerId);
        slider.style.transition =
            blacks.style.transition = 'transform 0.08s ease-out';
        slider.style.cursor = 'grab';
    });
}

/* ===== Start ===== */
const data = buildData();
const slider = document.getElementById('slider');
const blacks = document.getElementById('blacks');
const container = document.getElementById('container');

renderWhite(data, slider);
renderBlack(data, blacks);
bindDrag(container, slider, blacks);
</script>

</body>
</html>
