<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>钢琴（标准按键名称显示 + 频率显示 + 滑动控制）</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {background:#f5f5f5; padding-bottom:80px;}

.piano-container, .piano-container * {
    user-select:none;
    -webkit-user-select:none;
    -webkit-user-drag:none;
}

.piano-container {
    position:relative;
    height:460px;
    overflow:hidden;
    padding:20px;
    margin-bottom:20px;
}

.piano-slider {
    position:absolute;
    top:0;
    left:0;
    display:flex;
    align-items:flex-end;
    cursor:grab;
    transition:transform 0.08s ease-out;
}

/* ===== 白键 ===== */
.white-key {
    width:80px;
    height:360px;
    background:#fff;
    border:1px solid #ccc;
    position:relative;
}

.white-key-info {
    position:absolute;
    bottom:-40px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.white-key .note-name {
    font-size:13px;
    color:#333;
    font-weight:500;
    line-height:1.2;
}

.white-key .note-freq {
    font-size:11px;
    color:#666;
    line-height:1.2;
}

/* ===== 黑键 ===== */
.black-keys {
    position:absolute;
    top:0;
    left:0;
    height:220px;
    z-index:2;
    /* 移除 pointer-events: none; 让黑键容器也能接收事件 */
}

.black-key {
    position:absolute;
    top:0;
    width:48px;
    height:220px;
    background:#222;
    border-radius:0 0 6px 6px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;
    padding-bottom:10px;
    cursor:pointer;
}

.black-key-info {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    width:100%;
}

.black-key .note-name {
    font-size:12px;
    color:#fff;
    font-weight:500;
    line-height:1.1;
    text-shadow:0 1px 2px rgba(0,0,0,0.7);
}

.black-key .note-freq {
    font-size:9px;
    color:#ccc;
    line-height:1.1;
    text-shadow:0 1px 2px rgba(0,0,0,0.7);
}

/* ===== 滑块控制 ===== */
.slider-control {
    width:100%;
    max-width:1400px;
    margin:0 auto;
    padding:0 20px;
    display:flex;
    align-items:center;
    gap:15px;
}

.slider-track {
    flex:1;
    height:8px;
    background:#e0e0e0;
    border-radius:4px;
    position:relative;
    cursor:pointer;
}

.slider-thumb {
    position:absolute;
    top:50%;
    transform:translate(-50%, -50%);
    width:24px;
    height:24px;
    background:#3498db;
    border-radius:50%;
    cursor:grab;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* ===== 按键悬停效果 ===== */
.white-key:hover {
    background:#f9f9f9;
}

.white-key:active {
    background:#e0e0e0;
}

.black-key:hover {
    background:#333;
}

.black-key:active {
    background:#444;
}

/* 添加响应式调整 */
@media (max-width: 768px) {
    .white-key {
        width:70px;
    }
    
    .white-key-info {
        bottom:-36px;
    }
    
    .white-key .note-name {
        font-size:12px;
    }
    
    .white-key .note-freq {
        font-size:10px;
    }
    
    .black-key {
        width:42px;
    }
    
    .black-key .note-name {
        font-size:11px;
    }
    
    .black-key .note-freq {
        font-size:8px;
    }
}
</style>
</head>

<body>

<div class="piano-container" id="container">
    <div class="piano-slider" id="slider"></div>
    <div class="black-keys" id="blacks"></div>
</div>

<div class="slider-control">
    <span class="slider-label">琴键视图滑动</span>
    <div class="slider-track" id="sliderTrack">
        <div class="slider-thumb" id="sliderThumb"></div>
    </div>
</div>

<script>
/* ===== Audio ===== */
let audioCtx = null;
// 存储当前正在播放的音符
let activeNotes = new Map();

function getAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

/**
 * 开始播放音符
 * @param {number} freq - 音符频率
 * @param {HTMLElement} keyElement - 琴键元素
 */
function startNote(freq, keyElement) {
    // 如果该琴键已有音符在播放，先停止
    if (activeNotes.has(keyElement)) {
        stopNote(keyElement);
    }

    const ctx = getAudioContext();
    const t = ctx.currentTime;
    
    // 创建振荡器和增益节点
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    // 钢琴音色设置（三角波+包络）
    osc.type = 'triangle';
    osc.frequency.value = freq;
    
    // 钢琴按键包络：快速起音，持续发声，松开后快速衰减
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.8, t + 0.05); // 快速起音
    gain.gain.linearRampToValueAtTime(0.75, t + 0.2); // 轻微衰减保持
    
    // 连接节点
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    // 开始播放
    osc.start(t);
    
    // 存储当前播放的音符信息
    activeNotes.set(keyElement, {
        osc: osc,
        gain: gain,
        freq: freq,
        startTime: t
    });
}

/**
 * 停止播放音符
 * @param {HTMLElement} keyElement - 琴键元素
 */
function stopNote(keyElement) {
    if (!activeNotes.has(keyElement)) return;
    
    const note = activeNotes.get(keyElement);
    const ctx = getAudioContext();
    const t = ctx.currentTime;
    
    // 钢琴松开包络：快速衰减
    note.gain.gain.cancelScheduledValues(t);
    note.gain.gain.setValueAtTime(note.gain.gain.value, t);
    note.gain.gain.linearRampToValueAtTime(0, t + 0.3); // 0.3秒衰减到0
    
    // 安排停止和清理
    note.osc.stop(t + 0.3);
    setTimeout(() => {
        note.osc.disconnect();
        note.gain.disconnect();
        activeNotes.delete(keyElement);
    }, 300);
}

/* ===== Piano Data ===== */
const NOTES_ORDER = ['A', 'A#', 'B', 'C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#'];
const BLACK_SET = new Set(['A#', 'C#', 'D#', 'F#', 'G#']);

function buildData() {
    const A0 = 27.5;
    let octave = 0;
    const data = [];
    for (let i = 0; i < 88; i++) {
        const note = NOTES_ORDER[i % 12];
        if (note === 'C' && i !== 0) octave++;
        data.push({
            note,
            octave,
            fullName: note + octave,
            freq: A0 * Math.pow(2, i / 12),
            isBlack: BLACK_SET.has(note)
        });
    }
    return data;
}

/* ===== Render White Keys ===== */
function renderWhite(data, el) {
    el.innerHTML = '';
    data.forEach(k => {
        if (!k.isBlack) {
            const d = document.createElement('div');
            d.className = 'white-key';
            d.dataset.freq = k.freq;
            d.dataset.name = k.fullName;

            const infoDiv = document.createElement('div');
            infoDiv.className = 'white-key-info';
            
            const label = document.createElement('div');
            label.className = 'note-name';
            label.textContent = k.fullName;

            const freq = document.createElement('div');
            freq.className = 'note-freq';
            freq.textContent = k.freq.toFixed(2) + ' Hz';

            infoDiv.appendChild(label);
            infoDiv.appendChild(freq);
            d.appendChild(infoDiv);
            el.appendChild(d);
        }
    });
}

/* ===== Render Black Keys ===== */
function renderBlack(data, el) {
    el.innerHTML = '';
    const whiteW = document.querySelector('.white-key').offsetWidth;
    const blackW = 48;
    let w = -1;

    data.forEach(k => {
        if (!k.isBlack) { w++; return; }

        const b = document.createElement('div');
        b.className = 'black-key';
        b.style.left = (w * whiteW + whiteW - blackW / 2) + 'px';
        b.dataset.freq = k.freq;
        b.dataset.name = k.fullName;

        const infoDiv = document.createElement('div');
        infoDiv.className = 'black-key-info';
        
        const label = document.createElement('div');
        label.className = 'note-name';
        label.textContent = k.fullName;

        const freq = document.createElement('div');
        freq.className = 'note-freq';
        freq.textContent = k.freq.toFixed(2) + ' Hz';

        infoDiv.appendChild(label);
        infoDiv.appendChild(freq);
        b.appendChild(infoDiv);
        el.appendChild(b);
    });

    el.style.width = document.getElementById('slider').scrollWidth + 'px';
}

/* ===== 滑动相关 ===== */
let maxScrollX = 0;
const sliderTrack = document.getElementById('sliderTrack');
const sliderThumb = document.getElementById('sliderThumb');

function calcMaxScroll() {
    const containerWidth = container.clientWidth;
    const pianoTotalWidth = slider.scrollWidth;
    maxScrollX = Math.max(0, pianoTotalWidth - containerWidth);
    sliderThumb.style.maxLeft = (sliderTrack.offsetWidth - sliderThumb.offsetWidth) + 'px';
}

function pianoXToThumbLeft(x) {
    const w = sliderTrack.offsetWidth - sliderThumb.offsetWidth;
    return w * (Math.abs(x) / maxScrollX) || 0;
}
function thumbLeftToPianoX(left) {
    const w = sliderTrack.offsetWidth - sliderThumb.offsetWidth;
    return -((left / w) * maxScrollX) || 0;
}

function setPianoX(x) {
    const clamped = Math.max(-maxScrollX, Math.min(0, x));
    slider.style.transform = blacks.style.transform = `translateX(${clamped}px)`;
    sliderThumb.style.left = pianoXToThumbLeft(clamped) + 'px';
}
function getPianoX() {
    const t = getComputedStyle(slider).transform;
    return t === 'none' ? 0 : parseFloat(t.split(',')[4]) || 0;
}

/* ===== 琴键事件绑定 ===== */
function bindKeyEvents() {
    let currentPressedKey = null;
    let isDraggingSlider = false;
    const THRESHOLD = 6; // 滑动阈值

    // 通用的琴键事件处理
    function handleKeyInteraction(keyElement, e, type) {
        if (!keyElement || !keyElement.dataset.freq) return;
        
        switch(type) {
            case 'down':
                // 按下琴键时开始发声
                startNote(+keyElement.dataset.freq, keyElement);
                currentPressedKey = keyElement;
                break;
                
            case 'up':
            case 'leave':
                // 松开或离开琴键时停止发声
                if (currentPressedKey === keyElement) {
                    stopNote(keyElement);
                    currentPressedKey = null;
                }
                break;
        }
    }

    // 绑定所有琴键的鼠标事件
    document.addEventListener('pointerdown', e => {
        const keyElement = e.target.closest('[data-freq]');
        if (keyElement) {
            // 是琴键点击
            e.preventDefault();
            handleKeyInteraction(keyElement, e, 'down');
            
            // 记录初始位置，用于判断是滑动还是点击
            const startX = e.clientX;
            const startY = e.clientY;
            const startPianoX = getPianoX();
            
            // 检查是否开始滑动
            const checkDrag = (moveEvent) => {
                const dx = moveEvent.clientX - startX;
                const dy = moveEvent.clientY - startY;
                
                // 如果移动超过阈值，判定为滑动
                if (Math.abs(dx) > THRESHOLD || Math.abs(dy) > THRESHOLD) {
                    isDraggingSlider = true;
                    // 如果正在播放音符，停止它
                    if (currentPressedKey) {
                        stopNote(currentPressedKey);
                        currentPressedKey = null;
                    }
                    
                    // 移除检查事件
                    document.removeEventListener('pointermove', checkDrag);
                }
            };
            
            document.addEventListener('pointermove', checkDrag);
            
            // 清理函数
            const cleanup = () => {
                document.removeEventListener('pointermove', checkDrag);
                document.removeEventListener('pointerup', cleanup);
                document.removeEventListener('pointercancel', cleanup);
            };
            
            document.addEventListener('pointerup', cleanup);
            document.addEventListener('pointercancel', cleanup);
        } else {
            // 不是琴键点击，可能是滑动条
            isDraggingSlider = false;
        }
    });

    // 鼠标松开事件
    document.addEventListener('pointerup', e => {
        if (currentPressedKey && !isDraggingSlider) {
            handleKeyInteraction(currentPressedKey, e, 'up');
        }
        isDraggingSlider = false;
    });

    // 鼠标离开琴键事件
    document.addEventListener('pointerleave', e => {
        const keyElement = e.target.closest('[data-freq]');
        if (keyElement && currentPressedKey === keyElement && !isDraggingSlider) {
            handleKeyInteraction(keyElement, e, 'leave');
        }
    });

    // 滑动控制逻辑
    let isSliderDragging = false;
    slider.addEventListener('pointermove', e => {
        if (isDraggingSlider) {
            const dx = e.clientX - e.target.dataset.lastX || 0;
            if (e.target.dataset.lastX === undefined) {
                e.target.dataset.lastX = e.clientX;
            } else {
                setPianoX(getPianoX() + dx);
                e.target.dataset.lastX = e.clientX;
            }
        }
    });

    slider.addEventListener('pointerup', () => {
        delete slider.dataset.lastX;
        isDraggingSlider = false;
    });

    slider.addEventListener('pointercancel', () => {
        delete slider.dataset.lastX;
        isDraggingSlider = false;
    });
}

/* ===== Slider Control ===== */
function bindSliderControl() {
    let dragging = false;

    sliderThumb.addEventListener('mousedown', e => {
        dragging = true;
        document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const rect = sliderTrack.getBoundingClientRect();
        const left = e.clientX - rect.left - sliderThumb.offsetWidth / 2;
        const clamped = Math.max(0, Math.min(parseFloat(sliderThumb.style.maxLeft), left));
        setPianoX(thumbLeftToPianoX(clamped));
    });

    document.addEventListener('mouseup', () => {
        dragging = false;
        document.body.style.userSelect = 'auto';
    });

    sliderTrack.addEventListener('click', e => {
        const rect = sliderTrack.getBoundingClientRect();
        const left = e.clientX - rect.left - sliderThumb.offsetWidth / 2;
        const clamped = Math.max(0, Math.min(parseFloat(sliderThumb.style.maxLeft), left));
        setPianoX(thumbLeftToPianoX(clamped));
    });

    window.addEventListener('resize', () => {
        calcMaxScroll();
        setPianoX(getPianoX());
    });
}

/* ===== Start ===== */
const data = buildData();
const slider = document.getElementById('slider');
const blacks = document.getElementById('blacks');
const container = document.getElementById('container');

renderWhite(data, slider);
renderBlack(data, blacks);
calcMaxScroll();
bindKeyEvents(); // 替换原来的bindDrag函数
bindSliderControl();
sliderThumb.style.left = pianoXToThumbLeft(getPianoX()) + 'px';
</script>

</body>
</html>
